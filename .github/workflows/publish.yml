name: Publish

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    # workflow_dispatch can be started from any ref; only v* tags may deploy
    # (also keeps SNAPSHOT versions away from Central).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      # Tests are owned by the CI workflow (they already ran on the release branch);
      # the release pipeline builds, signs and uploads the bundle to the Central Portal
      # (autoPublish=false: the final publication is a manual step in the Portal UI).
      - name: Deploy to Maven Central
        run: mvn -B -Prelease clean deploy -DskipTests -Dgpg.signer=bc
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Archive central bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: central-bundle-${{ github.ref_name }}
          path: target/central-publishing/central-bundle.zip
          retention-days: 30
          if-no-files-found: warn
