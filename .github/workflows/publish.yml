name: Publish

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # gh release create needs write; checkout needs read (implied)

jobs:
  publish:
    # workflow_dispatch can be started from any ref; only v* tags may deploy
    # (also keeps SNAPSHOT versions away from Central).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags: needed to compute the previous release tag

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      # Tests are owned by the CI workflow (they already ran on the release branch);
      # the release pipeline builds, signs and uploads the bundle to the Central Portal
      # (autoPublish=false: the final publication is a manual step in the Portal UI).
      - name: Deploy to Maven Central
        run: mvn -B -Prelease clean deploy -DskipTests -Dgpg.signer=bc
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Archive central bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: central-bundle-${{ github.ref_name }}
          path: target/central-publishing/central-bundle.zip
          retention-days: 30
          if-no-files-found: warn

      # Publish release notes from the tag's CHANGELOG.md section. Idempotent so
      # a retry via workflow_dispatch doesn't fail when the release already exists.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi

          VERSION="${TAG#v}"
          NOTES="$RUNNER_TEMP/release-notes.md"

          # Section body: after the "## [X.Y.Z]" header, up to the next "## ["
          # header or the link-definition block (both exclusive). index() does a
          # literal match, so version dots need no regex escaping.
          sed 's/\r$//' CHANGELOG.md | awk -v ver="$VERSION" '
            insec && (/^## \[/ || /^\[[^]]+\]:/) { exit }
            insec { print }
            index($0, "## [" ver "]") == 1 { insec = 1 }
          ' > "$NOTES"

          if ! grep -q '[^[:space:]]' "$NOTES"; then
            echo "::warning::No CHANGELOG.md section found for $VERSION; falling back to generated notes."
            gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
            exit 0
          fi

          if PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null); then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "$GITHUB_REPOSITORY" "$PREV" "$TAG" >> "$NOTES"
          fi

          gh release create "$TAG" --verify-tag --title "$TAG" --notes-file "$NOTES"
